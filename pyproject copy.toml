[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsra-attn"
version = "0.1.0"
description = "DSRA attention verification suite"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "torch>=2.1",
  "numpy>=1.26",
  "matplotlib>=3.8",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.5",
]

[tool.ruff]
exclude = [".env"]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
norecursedirs = [".env"]
python_files = ["test_*.py"]
testpaths = ["tests"]

[tool.setuptools]
py-modules = ["dsra_layer", "dsra_model"]
